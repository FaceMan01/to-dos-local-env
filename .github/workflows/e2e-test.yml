name: Local Env CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  local-env:
    name: Setup Local Environment
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup and Start Dev Container
      uses: devcontainers/ci@v0.3
      with:
        runCmd: |
          echo "127.0.0.1       to-dos.local.tourmalinecore.internal" >> /etc/hosts
          kind create cluster --name to-dos --config kind-local-config.yaml --kubeconfig ./.to-dos-cluster-kubeconfig
          helmfile cache cleanup && helmfile --environment local --namespace local -f deploy/helmfile.yaml apply
          curl http://to-dos.local.tourmalinecore.internal:40080/api/to-dos-api/to-dos


